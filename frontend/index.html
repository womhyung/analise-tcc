<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Sistema TCC</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

    <h1>📊 Sistema TCC</h1>
    <p class="subtitle">Análise automática de questionários</p>

    <!-- Upload CSV -->
    <div class="input-group">
        <label>Arquivo CSV (Google Forms)</label>
        <input type="file" id="file">
    </div>

    <button onclick="upload()">Enviar Dados</button>

    <!-- Upload Texto Base -->
    <div class="input-group">
        <label>Texto Base (PDF ou DOC)</label>
        <input type="file" id="baseFile">
    </div>

    <button onclick="uploadBase()">Enviar Texto Base</button>

    <!-- Gerar PDF -->
    <button class="primary" onclick="pdf()">📄 Gerar Relatório</button>

    <!-- Feedback -->
    <div id="status"></div>

</div>

<!-- JS -->
<script src="script.js"></script>

</body>
</html>
